name: austen
tenant_id: ramsac
hostname: ramsac-austen.ironbridge.tech

upstream:
  port: 4097
  # GET /health returns 200 unconditionally (the process is up = ready).
  # ib-install-quadlets probes this after every (re)start and fails the
  # deploy (with a Slack alert) if it doesn't 2xx within startup_timeout.
  health_check: /health

# Single-process file-backed store (feedback_log.json / search_log.json on
# /apps/storage). `direct` restarts in place so there is never a second
# writer racing the same files or the same Azure Blob container — opting
# out of canary-by-default on purpose.
deploy:
  strategy: direct
  # rclone pulls the workspace from Azure Blob on boot before the server
  # binds; 60s leaves headroom for a cold VM + a non-trivial bucket.
  startup_timeout: 60s

expose:
  via: public

# Fully public: the feedback/search widget is embedded in the public digest
# pages and must be reachable by every recipient with no login. No Cloudflare
# Access, no app-level auth.
auth:
  mode: app

# Outbound is default-deny (tinyproxy). The container needs:
#   - storage_azure : rclone HTTPS to *.blob.core.windows.net (persistence)
#   - gmail_smtp    : smtp.gmail.com:587 for the daily feedback-digest email
# NOTE: gmail_smtp is STARTTLS on :587, not HTTP — tinyproxy filters HTTP/HTTPS
# hostnames, so this entry only helps once tinyproxy tunnels port-587 CONNECT
# traffic. If the daily email can't connect, a direct VM firewall allowance is
# the fix. (egress isn't enforced in the current infra version anyway —
# ib-validate WARNs it's forward-compat.) Persistence (rclone/HTTPS) is fine.
egress:
  default: deny
  allow:
    - storage_azure
    - gmail_smtp
