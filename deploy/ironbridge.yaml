name: austen
tenant_id: ramsac
hostname: ramsac-austen.ironbridge.tech
upstream:
  port: 8080
  health_check: /healthz

deploy:
  strategy: direct
  startup_timeout: 30s

expose:
  via: public

# Cloudflare Access gates the route; Access is configured with Entra
# as the identity provider for both IdPs below (see ai-guild-infra
# ops/app-repo.md). Ironbridge engineers always get the `ironbridge`
# IdP; `ramsac` covers Ramsac's own tenant, since Austen serves
# ramsac's salesforce.
#
# PLANNED CUTOVER (see deploy/austen.container + PR description): this PR adds
# in-app Entra OIDC (single-tenant Ramsac). Once OIDC is configured and a test
# login succeeds, cut this block over to app-owned auth and add a Cloudflare
# Access bypass for ramsac-austen.ironbridge.tech, so users authenticate ONCE
# (in the app) against Ramsac only:
#     auth:
#       mode: app
# Do the manifest flip and the Cloudflare bypass together, AFTER OIDC is live —
# flipping to `app` while OIDC is dormant would leave the route ungated.
auth:
  mode: access
  idps: [ironbridge, ramsac]
  rules:
    - decision: allow
      include:
        - email_domain: ironbridge.tech
        - email_domain: ramsac.com
