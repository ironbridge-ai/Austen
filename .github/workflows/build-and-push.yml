name: build-and-push

# Builds the austen image from the Containerfile and pushes it to ghcr.io on
# every merge to main.
#
# SELF-CONTAINED — same rationale as validate.yml: the ai-guild-infra composite
# `build-and-push-app@main` lives in a PRIVATE repo the default GITHUB_TOKEN
# can't resolve, so the job died at "Prepare all required actions" during job
# setup and NO image was ever published (the ghcr package didn't exist, so the
# reconcile had nothing to pull). This builds + pushes with the built-in
# GITHUB_TOKEN (packages: write) instead — no cross-repo/private dependency.
#
# Pushed tags:
#   ghcr.io/ironbridge-ai/austen:main          (rolling — referenced by the Quadlet)
#   ghcr.io/ironbridge-ai/austen:main-<sha>    (immutable — for rollback)
#
# The digest write-back into deploy/austen.container that the composite did is
# skipped; the Quadlet's :main tag + ib-build-apps pulling on digest-move is the
# supported reconcile path. If this repo is later added to the
# INTERNAL_REPOS_TOKEN access list (or the composite accepts a token input),
# this can swap back to the composite to regain digest pinning.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy/*.container'
  workflow_dispatch:

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push
        run: |
          set -euo pipefail
          IMAGE=ghcr.io/ironbridge-ai/austen
          SHA_TAG="main-$(echo "${GITHUB_SHA}" | cut -c1-7)"
          docker build -f Containerfile -t "$IMAGE:main" -t "$IMAGE:$SHA_TAG" .
          docker push "$IMAGE:main"
          docker push "$IMAGE:$SHA_TAG"
          echo "Pushed $IMAGE:main and $IMAGE:$SHA_TAG"
